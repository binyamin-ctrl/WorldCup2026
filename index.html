body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
:root{--bg:#f0f7f0;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#0d2b0d;--muted:#4a7a4a;--accent:#006633;--chip:#e0f0e0;--green:#006633;--red:#e53935;--gold:#F0B429;--silver:#B0BEC5;--bronze:#CD7F32}

button{cursor:pointer;font-family:inherit;direction:rtl}
input{font-family:inherit;direction:rtl}
.screen{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.topbar{display:flex;align-items:center;padding:10px 16px 8px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10;gap:8px}
.topbar-title{flex:1;font-weight:700;font-size:15px;color:var(--text);text-align:center}
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px 20px}
.top-nav{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:49px;z-index:9;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.top-nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;padding:8px 14px 6px;background:none;border:none;border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;font-weight:400;white-space:nowrap;cursor:pointer;transition:all .15s}
.nav-btn.active{color:var(--accent);font-weight:700;border-bottom:3px solid var(--accent)}
.nav-btn:hover{color:var(--text)}
.nav-emoji{font-size:16px}
.card{background:var(--surface);border-radius:14px;border:0.5px solid var(--border);padding:13px 15px;margin-bottom:10px}
.chip{background:var(--chip);border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);font-weight:600;cursor:pointer}
.chip.active{background:var(--accent);color:#fff;border-color:transparent}
.btn{padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;width:100%;margin-top:6px}
.btn:disabled{opacity:0.45}
.input{width:100%;padding:11px 14px;border-radius:10px;border:0.5px solid var(--border);background:var(--bg);font-size:15px;color:var(--text);outline:none;text-align:right}
.error{color:var(--red);font-size:13px;text-align:center;margin-top:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;color:#fff}
.badge-green{background:var(--green)}
.badge-red{background:var(--red)}
.hidden{display:none!important}
.loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:28px;background:var(--bg)}
.tab-bar{display:flex;background:var(--chip);border-radius:10px;padding:3px;margin:10px 16px 4px}
.tab-btn{flex:1;padding:8px 0;border-radius:8px;border:none;background:transparent;color:var(--muted);font-weight:400;font-size:13px;transition:all .15s}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:700}
.match-teams{display:flex;align-items:center;gap:8px;margin:8px 0}
.team-circle{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.bet-chips{display:flex;gap:6px}
.bet-chip{flex:1;padding:6px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--chip);color:var(--muted);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .13s}
.bet-chip.sel{background:var(--accent);color:#fff;border:none}
.bet-chip.disabled{opacity:.32}
.bet-chip span:first-child{font-size:14px}
</style>

function hashPwd(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function teamColor(name){const p=["#1a6fa8","#b83232","#2e8b57","#8b5e2e","#6a4fa8","#b87a1a","#2e7a8b","#a83268","#3a7a3a","#8b3a3a"];const i=(name.charCodeAt(0)+(name.charCodeAt(1)||0))%p.length;return p[i];}

// נעילה אוטומטית לפי שעת קיקאוף (שעון ישראל)
function isMatchLocked(m){
  // נעול ידנית ע"י מנהל
  if(m.locked||m.result) return true;
  // תאריך/שעה לא ידועים
  if(!m.date||!m.time||m.date==="טרם נקבע"||m.time==="—") return false;
  try{
    // מיפוי חודשים עבריים לאנגלית
    const months={"ינואר":1,"פברואר":2,"מרץ":3,"אפריל":4,"מאי":5,"יוני":6,"יולי":7,"אוגוסט":8,"ספטמבר":9,"אוקטובר":10,"נובמבר":11,"דצמבר":12};
    const parts=m.date.split(" ");
    const day=parseInt(parts[0]);
    const month=months[parts[1]];
    const year=2026;
    const [hh,mm]=m.time.split(":").map(Number);
    // השעות כבר בשעון ישראל – בונים Date לפי UTC+3
    const kickoff=new Date(Date.UTC(year,month-1,day,hh-3,mm));
    return Date.now()>=kickoff.getTime();
  }catch(e){return false;}
}
function qs(sel){return document.querySelector(sel);}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}
function shortName(n){return n.length>6?n.slice(0,6)+"…":n;}

// ── State ─────────────────────────────────────────────────────────────────────
let state={user:null,screen:"matches",dark:false,activeGroup:"א",matches:[...SCHEDULE],scorers:[...DEFAULT_SCORERS],departments:[...DEFAULT_DEPARTMENTS],prizes:{first:"",second:"",third:"",dept:""},adminTab:"results",adminGroup:"א",userFilter:"all",leaderTab:"personal",allUsers:[],liveUsers:[]};

// ── Firestore ─────────────────────────────────────────────────────────────────
async function fsGetUser(name){
  const d=await getDoc(doc(db,"users",name.toLowerCase()));
  return d.exists()?d.data():null;
}
async function fsSaveUser(data){
  await setDoc(doc(db,"users",data.name.toLowerCase()),data,{merge:true});
}
async function fsGetSettings(){
  const d=await getDoc(doc(db,"settings","main"));
  return d.exists()?d.data():{};
}
async function fsSaveSettings(data){
  await setDoc(doc(db,"settings","main"),data,{merge:true});
}
async function fsGetAllUsers(){
  const snap=await getDocs(collection(db,"users"));
  return snap.docs.map(d=>d.data());
}
async function fsDeleteUser(name){
  await deleteDoc(doc(db,"users",name.toLowerCase()));
}
function fsListenUsers(cb){
  return onSnapshot(collection(db,"users"),snap=>{
    cb(snap.docs.map(d=>d.data()));
  });
}
function fsListenSettings(cb){
  return onSnapshot(doc(db,"settings","main"),snap=>{
    if(snap.exists())cb(snap.data());
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login(name,pwd,dept,pwd2,isNew){
  const existing=await fsGetUser(name);
  if(existing){
    if(existing.pwdHash!==hashPwd(pwd)){return"סיסמה שגויה";}
    state.user={...existing};
    return null;
  } else {
    if(!dept){return"יש לבחור מחלקה";}
    if(pwd.length<4){return"סיסמה חייבת להכיל לפחות 4 תווים";}
    if(pwd!==pwd2){return"הסיסמאות אינן תואמות";}
    const profile={name,dept,pwdHash:hashPwd(pwd),bets:{},scorerBet:null,winnerBet:null,points:0};
    await fsSaveUser(profile);
    state.user={...profile};
    return null;
  }
}
function logout(){
  state.user=null;
  sessionStorage.removeItem("mundial_user");
  render();
}

// ── Bet saving ────────────────────────────────────────────────────────────────
async function saveBet(matchId,val){
  if(!state.user)return;
  // בדיקת נעילה – מניעה כפולה גם בצד הלוגיקה
  const match=state.matches.find(m=>m.id===matchId);
  if(!match||isMatchLocked(match)){console.warn("ניסיון ניחוש על משחק נעול:",matchId);return;}
  state.user.bets={...state.user.bets,[matchId]:val};
  const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
  state.user.points=pts;
  const idx=state.liveUsers.findIndex(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
  if(idx>=0) state.liveUsers[idx]={...state.liveUsers[idx],bets:state.user.bets,points:pts};
  else state.liveUsers.push({...state.user,points:pts});
  await fsSaveUser({...state.user,points:pts});
}

async function saveScorerBet(player){
  if(!state.user)return;
  state.user.scorerBet=player;
  const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
  state.user.points=pts;
  const idx=state.liveUsers.findIndex(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
  if(idx>=0) state.liveUsers[idx]={...state.liveUsers[idx],scorerBet:player,points:pts};
  await fsSaveUser({...state.user,points:pts});
}

async function saveWinnerBet(team){
  if(!state.user)return;
  state.user.winnerBet=team;
  const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);

  await fsSaveUser({...state.user,points:pts});

// ── Compute points ────────────────────────────────────────────────────────────
function calcPoints(user,matches,scorers,prizes,winnerResult){
  let pts=0;
  matches.forEach(m=>{
    if(!user.bets||!user.bets[m.id]) return;
    pts+=1; // נקודה על כל ניחוש (ללא קשר לתוצאה)
    if(m.result&&user.bets[m.id]===m.result) pts+=5; // +5 על ניחוש נכון
  });
  if(user.scorerBet&&scorers.topScorer&&user.scorerBet===scorers.topScorer) pts+=8; // +8 מלך שערים
  if(user.winnerBet&&winnerResult&&user.winnerBet===winnerResult) pts+=10; // +10 אלופת המונדיאל
  return pts;
}

// חישוב וחידוש נקודות לכל המשתמשים ב-Firebase
async function recalcAllPoints(){
  const allUsers=await fsGetAllUsers();
  const topScorer=state.prizes.topScorer||null;
  const winnerResult=state.prizes.winner||null;
  const updates=allUsers.map(async u=>{
    const pts=calcPoints(u,state.matches,{topScorer},state.prizes,winnerResult);
    if(u.points!==pts){
      await fsSaveUser({...u,points:pts});
    }
  });
  await Promise.all(updates);
  console.log("✅ נקודות עודכנו לכל המשתמשים");
}

  const userBet=state.user.bets&&state.user.bets[m.id];
  const betResult=userBet&&m.result?(userBet===m.result?"win":"loss"):null;
  const card=el("div","card");
  let headerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:11px;color:var(--muted)">בית ${m.group} · ${m.date} · ${m.time}</span>`;
  if(betResult==="win")headerHTML+=`<span class="badge badge-green">+3 ✓</span>`;
  else if(betResult==="loss")headerHTML+=`<span class="badge badge-red">0</span>`;
  else if(autoLocked)headerHTML+=`<span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:2px 7px">⏰ מתחיל</span>`;
  else if(locked&&!m.result)headerHTML+=`<span style="font-size:11px;color:var(--muted)">🔒</span>`;
  headerHTML+="</div>";

  const homeColor=teamColor(m.home),awayColor=teamColor(m.away);

    <div class="team-circle" style="background:${awayColor}">${m.away.slice(0,2)}</div>
  </div>`;

  // Bet chips – לחיצה חוזרת מבטלת
  const chipsDiv=el("div","bet-chips");
  [[2,m.home],[`X`,"תיקו"],[1,m.away]].forEach(([v,label])=>{

    if(!locked)b.onclick=async()=>{
      // בדיקה כפולה – אולי המשחק התחיל מאז שנטען הדף
      if(isMatchLocked(m)){renderMatchesRefresh();return;}
      const newVal=isSelected?null:String(v);
      const pts_before=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
      if(newVal===null){
        delete state.user.bets[m.id];
        const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
        state.user.points=pts;
        const idx=state.liveUsers.findIndex(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
        if(idx>=0) state.liveUsers[idx]={...state.liveUsers[idx],bets:{...state.user.bets},points:pts};
        await updateDoc(doc(db,"users",state.user.name.toLowerCase()),{
          [`bets.${m.id}`]: deleteField(),
          points: pts
        });
      } else {
        state.user.bets[m.id]=newVal;
        const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
        state.user.points=pts;
        const idx=state.liveUsers.findIndex(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
        if(idx>=0) state.liveUsers[idx]={...state.liveUsers[idx],bets:{...state.user.bets},points:pts};
        await fsSaveUser({...state.user,points:pts});
      }
      renderMatchesRefresh();
    };
    chipsDiv.appendChild(b);
  });

    const p=el("p");p.style.cssText="font-size:11px;color:var(--accent);text-align:center;font-weight:600;margin-top:6px";
    p.textContent="✓ ניחשת: "+(userBet==="2"?m.home:userBet==="1"?m.away:"תיקו");

  exitBtn.textContent="יציאה ←";exitBtn.onclick=()=>overlay.remove();
  tb.appendChild(exitBtn);
  overlay.appendChild(tb);

  const tabBar=el("div","tab-bar");tabBar.style.margin="10px 16px 4px";
  [["results","תוצאות"],["users","משתמשים"],["depts","מחלקות"],["scorers","מלך שערים"],["prizes","פרסים"],["security","🔐 אבטחה"]].forEach(([id,label])=>{
    const b=el("button","tab-btn"+(state.adminTab===id?" active":""));b.textContent=label;

      state.adminTab=id;

async function renderAdminContent(content){
  content.innerHTML="";
  if(state.adminTab==="results") renderAdminResults(content);
  else if(state.adminTab==="users") await renderAdminUsers(content);
  else if(state.adminTab==="depts") renderAdminDepts(content);
  else if(state.adminTab==="scorers") renderAdminScorers(content);
  else if(state.adminTab==="prizes") renderAdminPrizes(content);
  else if(state.adminTab==="security") await renderAdminSecurity(content);
}

function renderAdminResults(content){
  content.innerHTML=""; // נקה לפני רינדור מחדש

  // כפתור חישוב נקודות מחדש
  const recalcBtn=el("button","btn");
  recalcBtn.style.cssText="margin-bottom:10px;background:var(--green);font-size:13px;padding:10px";
  recalcBtn.textContent="🔄 חשב נקודות מחדש לכל המשתמשים";
  recalcBtn.onclick=async()=>{
    recalcBtn.textContent="...מחשב";recalcBtn.disabled=true;
    await recalcAllPoints();
    recalcBtn.textContent="✅ נקודות עודכנו!";
    setTimeout(()=>{recalcBtn.textContent="🔄 חשב נקודות מחדש לכל המשתמשים";recalcBtn.disabled=false;},2500);
  };
  content.appendChild(recalcBtn);

  const tabs=el("div");tabs.style.cssText="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px";
  Object.keys(GROUPS).forEach(g=>{
    const done=state.matches.filter(m=>m.group===g&&m.result).length;
    const total=state.matches.filter(m=>m.group===g).length;
    const b=el("button","chip"+(g===state.adminGroup?" active":""));
    b.style.flexShrink="0";b.textContent=`בית ${g}${done>0?` (${done}/${total})`:""}`;
    b.onclick=()=>{state.adminGroup=g;renderAdminResults(content);};tabs.appendChild(b);
  });
  content.appendChild(tabs);
  state.matches.filter(m=>m.group===state.adminGroup).forEach(m=>{
    const card=el("div","card");card.style.border=m.result?"1.5px solid var(--green)":"0.5px solid var(--border)";
    let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;color:var(--muted)">${m.date} · ${m.time}</span>
      ${m.result?`<button onclick="clearResult('${m.id}')" style="font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">✕ נקה</button>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="flex:1;font-weight:600;font-size:13px;color:var(--text)">${m.home}</span>
      <span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:1px 6px">נ׳</span>
      <span style="flex:1;font-weight:600;font-size:13px;color:var(--text);text-align:left">${m.away}</span>
    </div>
    <div style="display:flex;gap:6px">`;
    [[2,m.home],[`X`,"תיקו"],[1,m.away]].forEach(([v,label])=>{
      h+=`<button onclick="setResult('${m.id}','${v}')" style="flex:1;padding:7px 4px;border-radius:8px;cursor:pointer;border:${m.result===String(v)?"none":"0.5px solid var(--border)"};background:${m.result===String(v)?"var(--green)":"var(--chip)"};color:${m.result===String(v)?"#fff":"var(--muted)"};font-size:10px;font-weight:600">${v} – ${shortName(String(label))}</button>`;
    });
    h+="</div>";
    card.innerHTML=h;content.appendChild(card);
  });
}

window.setResult=async(id,val)=>{
  const m=state.matches.find(m=>m.id===id);if(!m)return;
  m.result=val;m.locked=true;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});
  // חישוב נקודות אוטומטי לכל המשתמשים
  await recalcAllPoints();
  renderAdminResultsRefresh();
};
window.clearResult=async(id)=>{
  const m=state.matches.find(m=>m.id===id);if(!m)return;
  m.result=null;m.locked=false;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});
  // עדכון נקודות מחדש אחרי ביטול תוצאה
  await recalcAllPoints();
  renderAdminResultsRefresh();
};
function renderAdminResultsRefresh(){
  const content=qs("#admin-overlay > div:last-child");if(content)renderAdminResults(content);}

function showEditUserForm(content,allUsers,name){

function renderAdminDepts(content){
  const depts=[...getDepts()];

  const info=el("div","card");
  info.innerHTML=`<p style="font-weight:700;font-size:14px;color:var(--text);margin:0 0 4px">🏢 ניהול מחלקות</p>
    <p style="font-size:12px;color:var(--muted);margin:0">עדכן שמות מחלקות קיימות או הוסף מחלקות חדשות. שינויים ישפיעו על כל האפליקציה.</p>`;
  content.appendChild(info);

  const listDiv=el("div");listDiv.id="depts-list";listDiv.style.marginTop="10px";
  content.appendChild(listDiv);

  const renderList=()=>{
    listDiv.innerHTML="";
    depts.forEach((d,i)=>{
      const row=el("div");row.style.cssText="display:flex;gap:8px;align-items:center;margin-bottom:8px";
      const inp=el("input","input");inp.value=d;inp.style.cssText="flex:1;padding:9px 12px;font-size:13px";
      inp.oninput=()=>{depts[i]=inp.value;};
      const delBtn=el("button");delBtn.style.cssText="padding:8px 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--red);font-size:13px;flex-shrink:0";
      delBtn.textContent="✕";
      delBtn.onclick=()=>{
        if(depts.length<=1){alert("חייבת להיות לפחות מחלקה אחת");return;}
        depts.splice(i,1);renderList();
      };
      row.appendChild(inp);row.appendChild(delBtn);
      listDiv.appendChild(row);
    });
  };
  renderList();

  // כפתור הוסף מחלקה
  const addBtn=el("button");
  addBtn.style.cssText="width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--border);background:transparent;color:var(--accent);font-weight:600;font-size:13px;cursor:pointer;margin-top:4px";
  addBtn.textContent="+ הוסף מחלקה";
  addBtn.onclick=()=>{depts.push("מחלקה חדשה");renderList();};
  content.appendChild(addBtn);

  // שמור
  const saveBtn=el("button","btn");saveBtn.style.marginTop="12px";saveBtn.textContent="שמור מחלקות";
  saveBtn.onclick=async()=>{
    const cleaned=depts.map(d=>d.trim()).filter(Boolean);
    state.departments=cleaned;
    await fsSaveSettings({departments:cleaned});
    saveBtn.textContent="✓ נשמר!";setTimeout(()=>saveBtn.textContent="שמור מחלקות",2000);
  };
  content.appendChild(saveBtn);

  const warn=el("p");warn.style.cssText="font-size:11px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.6";
  warn.textContent="⚠️ שינוי שם מחלקה לא ישנה את המחלקה של משתמשים שכבר נרשמו – יש לעדכן אותם ידנית בלשונית משתמשים.";
  content.appendChild(warn);
}

async function init(){
  // Load settings from Firestore
  const settings=await fsGetSettings();
  if(settings.scorers)state.scorers=settings.scorers;
  if(settings.prizes)state.prizes=settings.prizes;
  // בדיקה – אם Firebase מחזיר רשימה ישנה נאפס לברירת מחדל החדשה
  const isOldDepts=(d)=>d&&d.some(x=>x==="מנהלה"||x==="שיווק"||x==="מפעל"||x==="שרשרת אספקה");
  if(settings.departments&&!isOldDepts(settings.departments)) state.departments=settings.departments;
  else { state.departments=[...DEFAULT_DEPARTMENTS]; await fsSaveSettings({departments:[...DEFAULT_DEPARTMENTS]}); }
  if(settings.matches){
    settings.matches.forEach(sm=>{
      const m=state.matches.find(x=>x.id===sm.id);
      if(m){m.result=sm.result||null;m.locked=!!sm.locked;}
    });
  }

  // Live listeners
  fsListenUsers(async users=>{
    state.liveUsers=users;
    if(state.user){
      const me=users.find(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
      if(me){
        state.user={...state.user,...me};
        // חשב נקודות מחדש לאחר קבלת נתוני המשתמש העדכניים
        const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
        if(state.user.points!==pts){
          state.user.points=pts;
          await fsSaveUser({...state.user,points:pts});
        }
      }
    }
    // עדכן תצוגה בכל מסך רלוונטי
    if(["leaderboard","profile","matches"].includes(state.screen)){render();}
  });
  fsListenSettings(settings=>{
    if(settings.scorers)state.scorers=settings.scorers;
    if(settings.prizes)state.prizes=settings.prizes;
    if(settings.departments&&!isOldDepts(settings.departments))state.departments=settings.departments;
    if(settings.matches){
      settings.matches.forEach(sm=>{
        const m=state.matches.find(x=>x.id===sm.id);
        if(m){m.result=sm.result||null;m.locked=!!sm.locked;}
      });
    }
    if(state.screen==="matches"||state.screen==="prizes")render();
  });

  // Auto-login
  const savedName=sessionStorage.getItem("mundial_user");
  if(savedName){
    const u=await fsGetUser(savedName);
    if(u){state.user=u;}
  }

  render();

  // חישוב נקודות מחדש בטעינה – מבטיח עדכניות
  setTimeout(async()=>{
    await recalcAllPoints();
    // רענן דירוג אם פתוח
    if(state.user&&state.screen==="leaderboard"){
      const area=qs(".scroll-area");
      if(area)renderLeaderboard(area);
    }
  }, 2000);
}

init();

// רענון אוטומטי כל 60 שניות – נעילת משחקים שהתחילו
setInterval(()=>{
  if(state.user&&state.screen==="matches"){
    // רנדר מחדש כדי לנעול משחקים שהתחילו
    const area=qs(".scroll-area");
    if(area)renderMatches(area);
  }
},60000);
</script>
</body>
</html>
