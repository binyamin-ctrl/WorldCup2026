*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
:root{--bg:#f0f7f0;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#0d2b0d;--muted:#4a7a4a;--accent:#006633;--chip:#e0f0e0;--green:#006633;--red:#e53935;--gold:#F0B429;--silver:#B0BEC5;--bronze:#CD7F32}

button{cursor:pointer;font-family:inherit;direction:rtl}
input{font-family:inherit;direction:rtl}
.screen{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.topbar{display:flex;align-items:center;padding:10px 16px 8px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10;gap:8px}
.topbar-title{flex:1;font-weight:700;font-size:15px;color:var(--text);text-align:center}
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px 20px}
.top-nav{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:49px;z-index:9;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.top-nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;padding:8px 14px 6px;background:none;border:none;border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;font-weight:400;white-space:nowrap;cursor:pointer;transition:all .15s}
.nav-btn.active{color:var(--accent);font-weight:700;border-bottom:3px solid var(--accent)}
.nav-btn:hover{color:var(--text)}
.nav-emoji{font-size:16px}
.card{background:var(--surface);border-radius:14px;border:0.5px solid var(--border);padding:13px 15px;margin-bottom:10px}
.chip{background:var(--chip);border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);font-weight:600;cursor:pointer}
.chip.active{background:var(--accent);color:#fff;border-color:transparent}
.btn{padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;width:100%;margin-top:6px}
.btn:disabled{opacity:0.45}
.input{width:100%;padding:11px 14px;border-radius:10px;border:0.5px solid var(--border);background:var(--bg);font-size:15px;color:var(--text);outline:none;text-align:right}
.error{color:var(--red);font-size:13px;text-align:center;margin-top:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;color:#fff}
.badge-green{background:var(--green)}
.badge-red{background:var(--red)}
.hidden{display:none!important}
.loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:28px;background:var(--bg)}
.tab-bar{display:flex;background:var(--chip);border-radius:10px;padding:3px;margin:10px 16px 4px}
.tab-btn{flex:1;padding:8px 0;border-radius:8px;border:none;background:transparent;color:var(--muted);font-weight:400;font-size:13px;transition:all .15s}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:700}
.match-teams{display:flex;align-items:center;gap:8px;margin:8px 0}
.team-circle{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.bet-chips{display:flex;gap:6px}
.bet-chip{flex:1;padding:6px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--chip);color:var(--muted);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .13s}
.bet-chip.sel{background:var(--accent);color:#fff;border:none}
.bet-chip.disabled{opacity:.32}
.bet-chip span:first-child{font-size:14px}
</style>

function hashPwd(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function teamColor(name){const p=["#1a6fa8","#b83232","#2e8b57","#8b5e2e","#6a4fa8","#b87a1a","#2e7a8b","#a83268","#3a7a3a","#8b3a3a"];const i=(name.charCodeAt(0)+(name.charCodeAt(1)||0))%p.length;return p[i];}

// נעילה אוטומטית לפי שעת קיקאוף (שעון ישראל)
function isMatchLocked(m){
  // נעול ידנית ע"י מנהל
  if(m.locked||m.result) return true;
  // תאריך/שעה לא ידועים
  if(!m.date||!m.time||m.date==="טרם נקבע"||m.time==="—") return false;
  try{
    // מיפוי חודשים עבריים לאנגלית
    const months={"ינואר":1,"פברואר":2,"מרץ":3,"אפריל":4,"מאי":5,"יוני":6,"יולי":7,"אוגוסט":8,"ספטמבר":9,"אוקטובר":10,"נובמבר":11,"דצמבר":12};
    const parts=m.date.split(" ");
    const day=parseInt(parts[0]);
    const month=months[parts[1]];
    const year=2026;
    const [hh,mm]=m.time.split(":").map(Number);
    // השעות כבר בשעון ישראל – בונים Date לפי UTC+3
    const kickoff=new Date(Date.UTC(year,month-1,day,hh-3,mm));
    return Date.now()>=kickoff.getTime();
  }catch(e){return false;}
}

// ── Firestore ─────────────────────────────────────────────────────────────────
async function fsGetUser(name){
  const d=await getDoc(doc(db,"users",name.toLowerCase()));
  return d.exists()?d.data():null;
}
async function fsSaveUser(data){
  await setDoc(doc(db,"users",data.name.toLowerCase()),data,{merge:true});
}
async function fsGetSettings(){
  const d=await getDoc(doc(db,"settings","main"));
  return d.exists()?d.data():{};
}
async function fsSaveSettings(data){
  await setDoc(doc(db,"settings","main"),data,{merge:true});
}
async function fsGetAllUsers(){
  const snap=await getDocs(collection(db,"users"));
  return snap.docs.map(d=>d.data());
}
async function fsDeleteUser(name){
  await deleteDoc(doc(db,"users",name.toLowerCase()));
}
function fsListenUsers(cb){
  return onSnapshot(collection(db,"users"),snap=>{
    cb(snap.docs.map(d=>d.data()));
  });
}
function fsListenSettings(cb){
  return onSnapshot(doc(db,"settings","main"),snap=>{
    if(snap.exists())cb(snap.data());
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login(name,pwd,dept,pwd2,isNew){
  const existing=await fsGetUser(name);
  if(existing){
    if(existing.pwdHash!==hashPwd(pwd)){return"סיסמה שגויה";}
    state.user={...existing};
    return null;
  } else {
    if(!dept){return"יש לבחור מחלקה";}
    if(pwd.length<4){return"סיסמה חייבת להכיל לפחות 4 תווים";}
    if(pwd!==pwd2){return"הסיסמאות אינן תואמות";}
    const profile={name,dept,pwdHash:hashPwd(pwd),bets:{},scorerBet:null,winnerBet:null,points:0};
    await fsSaveUser(profile);
    state.user={...profile};
    return null;
  }
}
function logout(){
  state.user=null;
  sessionStorage.removeItem("mundial_user");
  render();
}

}

// ── Compute points ────────────────────────────────────────────────────────────
function calcPoints(user,matches,scorers,prizes,winnerResult){
  let pts=0;
  matches.forEach(m=>{
    if(m.result&&user.bets&&user.bets[m.id]===m.result)pts+=3;
  });
  if(user.scorerBet&&scorers.topScorer&&user.scorerBet===scorers.topScorer)pts+=5;
  if(user.winnerBet&&winnerResult&&user.winnerBet===winnerResult)pts+=10;
  return pts;
}

// חישוב וחידוש נקודות לכל המשתמשים ב-Firebase
async function recalcAllPoints(){
  const allUsers=await fsGetAllUsers();
  const topScorer=state.prizes.topScorer||null;
  const winnerResult=state.prizes.winner||null;
  const updates=allUsers.map(async u=>{
    const pts=calcPoints(u,state.matches,{topScorer},state.prizes,winnerResult);
    if(u.points!==pts){
      await fsSaveUser({...u,points:pts});
    }
  });
  await Promise.all(updates);
  console.log("✅ נקודות עודכנו לכל המשתמשים");
}

    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px">הימורים לצורך כיף בלבד · ללא כסף אמיתי</p>
  </div>`;
  app.appendChild(wrap);
  // Wire admin button (now inside the form, not fixed)
  setTimeout(()=>{
    const adminEntryBtn=qs("#admin-entry-btn");
    if(adminEntryBtn) adminEntryBtn.onclick=()=>renderAdminLoginOverlay();
  },0);

  let isNew=null, selDept="";
  const nameIn=()=>qs("#ln-name");
  const pwdIn=()=>qs("#ln-pwd");
  const pwd2In=()=>qs("#ln-pwd2");
  const deptChips=()=>qs("#ln-dept-chips");
  const submitBtn=()=>qs("#ln-submit");
  const statusDiv=()=>qs("#ln-status");
  const errDiv=()=>qs("#ln-error");

  // Dept chips
  setTimeout(()=>{
    getDepts().forEach(d=>{
      const b=el("button","chip");b.textContent=d;
      b.onclick=()=>{selDept=d;deptChips().querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active");checkReady();};
      deptChips().appendChild(b);
    });

    nameIn().onblur=async()=>{
      const n=nameIn().value.trim();
      if(!n)return;
      const existing=await fsGetUser(n);
      isNew=!existing;
      statusDiv().style.display="flex";
      statusDiv().style.cssText="display:flex;align-items:center;gap:8px;background:var(--chip);border-radius:10px;padding:8px 12px";
      statusDiv().innerHTML=isNew?`<span>✨</span><p style="margin:0;font-size:13px;color:var(--text)">משתמש חדש! בחר מחלקה וצור סיסמה.</p>`:`<span>👋</span><p style="margin:0;font-size:13px;color:var(--text)">ברוך שובך! הזן את הסיסמה שלך.</p>`;
      if(existing){selDept=existing.dept;}
      qs("#ln-dept-wrap").style.display=isNew?"block":"none";
      qs("#ln-pwd-wrap").style.display="block";
      qs("#ln-pwd-label").textContent=isNew?"סיסמה חדשה":"סיסמה";
      qs("#ln-pwd2-wrap").style.display=isNew?"block":"none";
      submitBtn().textContent=isNew?"צור חשבון ←":"כניסה ←";
      checkReady();
    };

    function checkReady(){
      const n=nameIn().value.trim();
      const p=pwdIn()?pwdIn().value:"";
      const ok=n&&isNew!==null&&p&&(isNew?selDept&&pwd2In()&&pwd2In().value:true);
      if(submitBtn())submitBtn().disabled=!ok;
    }
    if(pwdIn())pwdIn().oninput=checkReady;
    if(pwd2In())pwd2In().oninput=checkReady;

    submitBtn().onclick=async()=>{
      errDiv().style.display="none";
      submitBtn().disabled=true;submitBtn().textContent="...";
      const err=await login(nameIn().value.trim(),pwdIn().value,selDept,pwd2In()?pwd2In().value:"",isNew);
      if(err){
        errDiv().textContent=err;errDiv().style.display="block";
        submitBtn().disabled=false;submitBtn().textContent=isNew?"צור חשבון ←":"כניסה ←";
      } else {
        sessionStorage.setItem("mundial_user",state.user.name.toLowerCase());
        render();
      }
    };
  },0);
}

// ── Matches screen ────────────────────────────────────────────────────────────
function renderMatches(area){
  // Group tabs
  const tabs=el("div");tabs.style.cssText="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px";
  [...Object.keys(GROUPS),"נוקאאוט"].forEach(g=>{
    const b=el("button","chip"+(g===state.activeGroup?" active":""));
    b.textContent=g==="נוקאאוט"?"נוקאאוט":("בית "+g);b.style.flexShrink="0";
    b.onclick=()=>{state.activeGroup=g;renderMatches(area);};
    tabs.appendChild(b);
  });
  area.innerHTML="";area.appendChild(tabs);

  if(state.activeGroup==="נוקאאוט"){
    renderKnockout(area);return;
  }
  const groupMatches=state.matches.filter(m=>m.group===state.activeGroup);
  groupMatches.forEach(m=>area.appendChild(matchCard(m)));
}

function matchCard(m){
  const locked=isMatchLocked(m);
  const autoLocked=locked&&!m.locked&&!m.result; // נעול אוטומטית (התחיל)
  const userBet=state.user.bets&&state.user.bets[m.id];
  const betResult=userBet&&m.result?(userBet===m.result?"win":"loss"):null;
  const card=el("div","card");
  let headerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:11px;color:var(--muted)">בית ${m.group} · ${m.date} · ${m.time}</span>`;
  if(betResult==="win")headerHTML+=`<span class="badge badge-green">+3 ✓</span>`;
  else if(betResult==="loss")headerHTML+=`<span class="badge badge-red">0</span>`;
  else if(autoLocked)headerHTML+=`<span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:2px 7px">⏰ מתחיל</span>`;
  else if(locked&&!m.result)headerHTML+=`<span style="font-size:11px;color:var(--muted)">🔒</span>`;
  headerHTML+="</div>";

  const homeColor=teamColor(m.home),awayColor=teamColor(m.away);
  headerHTML+=`<div class="match-teams">
    <div class="team-circle" style="background:${homeColor}">${m.home.slice(0,2)}</div>
    <span style="font-weight:600;font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.home}</span>
    <span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:2px 6px;flex-shrink:0">נ׳</span>
    <span style="font-weight:600;font-size:13px;color:var(--text);flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.away}</span>
    <div class="team-circle" style="background:${awayColor}">${m.away.slice(0,2)}</div>
  </div>`;
  card.innerHTML=headerHTML;

  // Bet chips: 2(home/right) X 1(away/left)
  const chipsDiv=el("div","bet-chips");
  [[2,m.home],[`X`,"תיקו"],[1,m.away]].forEach(([v,label])=>{
    const b=el("button","bet-chip"+(userBet===String(v)?" sel":"")+(locked&&userBet!==String(v)?" disabled":""));
    b.innerHTML=`<span>${v}</span><span style="font-size:9px">${shortName(String(label))}</span>`;
    if(!locked)b.onclick=async()=>{await saveBet(m.id,String(v));// optimistic
      state.user.bets[m.id]=String(v);renderMatchesRefresh();};
    chipsDiv.appendChild(b);
  });
  card.appendChild(chipsDiv);

  if(userBet&&!m.result){
    const p=el("p");p.style.cssText="font-size:11px;color:var(--accent);text-align:center;font-weight:600;margin-top:6px";
    p.textContent="✓ ניחשת: "+(userBet==="2"?m.home:userBet==="1"?m.away:"תיקו");
    card.appendChild(p);
  }
  return card;
}

  const area=qs(".scroll-area");if(!area)return;
  renderMatches(area);
}

// ── Leaderboard screen ────────────────────────────────────────────────────────
function renderLeaderboard(area){
  const tabBar=el("div","tab-bar");
  [["personal","דירוג אישי"],["dept","דירוג מחלקות"],["participation","🏅 תחרות השתתפות"]].forEach(([id,label])=>{
    const b=el("button","tab-btn"+(state.leaderTab===id?" active":""));b.textContent=label;
    b.onclick=()=>{state.leaderTab=id;renderLeaderboard(area);};tabBar.appendChild(b);
  });
  area.innerHTML="";area.appendChild(tabBar);
  const medals=["🥇","🥈","🥉"];const mc=["var(--gold)","var(--silver)","var(--bronze)"];
  if(state.leaderTab==="personal"){
    if(!state.liveUsers.length){area.innerHTML+='<p style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px">🏆 הטבלה תתמלא בקרוב</p>';return;}
    const sorted=[...state.liveUsers].sort((a,b)=>(b.points||0)-(a.points||0));
    sorted.forEach((u,i)=>{
      const card=el("div","card");card.style.display="flex";card.style.alignItems="center";card.style.gap="12px";
      if(i<3)card.style.borderLeft=`1.5px solid ${mc[i]}`;
      card.innerHTML=`<span style="width:26px;text-align:center;font-size:${i<3?20:13}px;color:${i<3?mc[i]:"var(--muted)"};font-weight:700">${i<3?medals[i]:i+1}</span>
      <div style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:800;flex-shrink:0">${u.name.slice(0,1)}</div>
      <div style="flex:1;min-width:0"><p style="margin:0;font-weight:600;font-size:14px;color:var(--text)">${u.name}</p><p style="margin:0;font-size:12px;color:var(--muted)">${u.dept}</p></div>
      <div style="text-align:left"><p style="margin:0;font-size:20px;font-weight:800;color:var(--accent)">${u.points||0}</p><p style="margin:0;font-size:10px;color:var(--muted)">נקודות</p></div>`;
      area.appendChild(card);
    });
  } else if(state.leaderTab==="dept") {
    // מאחד מחלקות לפי DEPT_GROUPS
    const groupMap={};
    Object.keys(DEPT_GROUPS).forEach(g=>{groupMap[g]={name:g,total:0,count:0,members:[],subDepts:DEPT_GROUPS[g]};});
    state.liveUsers.forEach(u=>{
      for(const [g,depts] of Object.entries(DEPT_GROUPS)){
        if(depts.includes(u.dept)){
          groupMap[g].total+=(u.points||0);
          groupMap[g].count++;
          groupMap[g].members.push(u);
          break;
        }
      }
    });
    const sorted=Object.values(groupMap).map(d=>({...d,avg:d.count?Math.round(d.total/d.count):0})).sort((a,b)=>b.avg-a.avg);
    sorted.forEach((d,i)=>{
      const card=el("div","card");if(i<3)card.style.borderLeft=`1.5px solid ${mc[i]}`;

  [["results","תוצאות"],["users","משתמשים"],["depts","מחלקות"],["scorers","מלך שערים"],["prizes","פרסים"],["security","🔐 אבטחה"]].forEach(([id,label])=>{

async function renderAdminContent(content){
  content.innerHTML="";
  if(state.adminTab==="results") renderAdminResults(content);
  else if(state.adminTab==="users") await renderAdminUsers(content);
  else if(state.adminTab==="depts") renderAdminDepts(content);
  else if(state.adminTab==="scorers") renderAdminScorers(content);
  else if(state.adminTab==="prizes") renderAdminPrizes(content);
  else if(state.adminTab==="security") await renderAdminSecurity(content);
}

function renderAdminResults(content){
  content.innerHTML=""; // נקה לפני רינדור מחדש

  // כפתור חישוב נקודות מחדש
  const recalcBtn=el("button","btn");
  recalcBtn.style.cssText="margin-bottom:10px;background:var(--green);font-size:13px;padding:10px";
  recalcBtn.textContent="🔄 חשב נקודות מחדש לכל המשתמשים";
  recalcBtn.onclick=async()=>{
    recalcBtn.textContent="...מחשב";recalcBtn.disabled=true;
    await recalcAllPoints();
    recalcBtn.textContent="✅ נקודות עודכנו!";
    setTimeout(()=>{recalcBtn.textContent="🔄 חשב נקודות מחדש לכל המשתמשים";recalcBtn.disabled=false;},2500);
  };
  content.appendChild(recalcBtn);

  const tabs=el("div");tabs.style.cssText="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px";
  Object.keys(GROUPS).forEach(g=>{
    const done=state.matches.filter(m=>m.group===g&&m.result).length;
    const total=state.matches.filter(m=>m.group===g).length;
    const b=el("button","chip"+(g===state.adminGroup?" active":""));
    b.style.flexShrink="0";b.textContent=`בית ${g}${done>0?` (${done}/${total})`:""}`;
    b.onclick=()=>{state.adminGroup=g;renderAdminResults(content);};tabs.appendChild(b);
  });
  content.appendChild(tabs);
  state.matches.filter(m=>m.group===state.adminGroup).forEach(m=>{
    const card=el("div","card");card.style.border=m.result?"1.5px solid var(--green)":"0.5px solid var(--border)";
    let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;color:var(--muted)">${m.date} · ${m.time}</span>
      ${m.result?`<button onclick="clearResult('${m.id}')" style="font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">✕ נקה</button>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="flex:1;font-weight:600;font-size:13px;color:var(--text)">${m.home}</span>
      <span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:1px 6px">נ׳</span>
      <span style="flex:1;font-weight:600;font-size:13px;color:var(--text);text-align:left">${m.away}</span>
    </div>
    <div style="display:flex;gap:6px">`;
    [[2,m.home],[`X`,"תיקו"],[1,m.away]].forEach(([v,label])=>{
      h+=`<button onclick="setResult('${m.id}','${v}')" style="flex:1;padding:7px 4px;border-radius:8px;cursor:pointer;border:${m.result===String(v)?"none":"0.5px solid var(--border)"};background:${m.result===String(v)?"var(--green)":"var(--chip)"};color:${m.result===String(v)?"#fff":"var(--muted)"};font-size:10px;font-weight:600">${v} – ${shortName(String(label))}</button>`;
    });
    h+="</div>";
    card.innerHTML=h;content.appendChild(card);
  });
}

window.setResult=async(id,val)=>{
  const m=state.matches.find(m=>m.id===id);if(!m)return;
  m.result=val;m.locked=true;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});
  // חישוב נקודות אוטומטי לכל המשתמשים
  await recalcAllPoints();
  renderAdminResultsRefresh();
};
window.clearResult=async(id)=>{
  const m=state.matches.find(m=>m.id===id);if(!m)return;
  m.result=null;m.locked=false;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});
  // עדכון נקודות מחדש אחרי ביטול תוצאה
  await recalcAllPoints();
  renderAdminResultsRefresh();
};
function renderAdminResultsRefresh(){
  const content=qs("#admin-overlay > div:last-child");if(content)renderAdminResults(content);}

  form.innerHTML=`<p style="font-weight:700;font-size:13px;color:var(--text);margin:0 0 10px">הוספת משתמש חדש</p>
  <input id="add-name" class="input" placeholder="שם מלא" style="margin-bottom:8px"/>
  <input id="add-pwd" class="input" type="password" placeholder="סיסמה" style="margin-bottom:8px;text-align:center;letter-spacing:2px"/>
  <div id="add-dept-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
  <div style="display:flex;gap:8px">
    <button id="add-ok" class="btn" style="margin-top:0">הוסף</button>
    <button id="add-cancel" class="btn" style="margin-top:0;background:transparent;color:var(--muted);border:0.5px solid var(--border)">ביטול</button>
  </div>`;
  content.insertBefore(form,content.children[1]);
  let selDept="";
  form.querySelectorAll && getDepts().forEach(d=>{
    const b=el("button","chip");b.textContent=d;
    b.onclick=()=>{selDept=d;form.querySelectorAll("#add-dept-chips button").forEach(x=>x.classList.remove("active"));b.classList.add("active");};
    qs("#add-dept-chips").appendChild(b);
  });
  qs("#add-cancel").onclick=()=>form.remove();
  qs("#add-ok").onclick=async()=>{
    const name=qs("#add-name").value.trim(),pwd=qs("#add-pwd").value;
    if(!name||!selDept||!pwd){alert("יש למלא את כל השדות");return;}
    const profile={name,dept:selDept,pwdHash:hashPwd(pwd),bets:{},scorerBet:null,winnerBet:null,points:0};
    await fsSaveUser(profile);form.remove();renderAdminContent(content);
  };
}

function showEditUserForm(content,allUsers,name){
  const u=allUsers.find(x=>x.name===name);if(!u)return;
  const form=el("div","card");form.style.border="1.5px solid var(--accent)";
  form.innerHTML=`<p style="font-weight:700;font-size:13px;color:var(--text);margin:0 0 10px">עריכת משתמש: ${u.name}</p>
  <input id="edit-name" class="input" value="${u.name}" style="margin-bottom:8px"/>
  <input id="edit-pwd" class="input" type="password" placeholder="סיסמה חדשה (השאר ריק = ללא שינוי)" style="margin-bottom:8px;text-align:center;letter-spacing:2px"/>
  <div id="edit-dept-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
  <div style="display:flex;gap:8px">
    <button id="edit-ok" class="btn" style="margin-top:0">שמור</button>
    <button id="edit-cancel" class="btn" style="margin-top:0;background:transparent;color:var(--muted);border:0.5px solid var(--border)">ביטול</button>
  </div>`;
  content.insertBefore(form,content.children[1]);
  let selDept=u.dept;
  getDepts().forEach(d=>{
    const b=el("button","chip"+(d===selDept?" active":""));b.textContent=d;
    b.onclick=()=>{selDept=d;form.querySelectorAll("#edit-dept-chips button").forEach(x=>x.classList.remove("active"));b.classList.add("active");};
    qs("#edit-dept-chips").appendChild(b);
  });
  qs("#edit-cancel").onclick=()=>form.remove();
  qs("#edit-ok").onclick=async()=>{
    const newName=qs("#edit-name").value.trim(),newPwd=qs("#edit-pwd").value;
    const updated={...u,name:newName,dept:selDept};
    if(newPwd&&newPwd.length>=4)updated.pwdHash=hashPwd(newPwd);
    if(newName!==u.name){await fsDeleteUser(u.name);}
    await fsSaveUser(updated);form.remove();renderAdminContent(content);
  };
}

// ── Admin Departments Tab ─────────────────────────────────────────────────────
function renderAdminDepts(content){
  const depts=[...getDepts()];

  const info=el("div","card");
  info.innerHTML=`<p style="font-weight:700;font-size:14px;color:var(--text);margin:0 0 4px">🏢 ניהול מחלקות</p>
    <p style="font-size:12px;color:var(--muted);margin:0">עדכן שמות מחלקות קיימות או הוסף מחלקות חדשות. שינויים ישפיעו על כל האפליקציה.</p>`;
  content.appendChild(info);

  const listDiv=el("div");listDiv.id="depts-list";listDiv.style.marginTop="10px";
  content.appendChild(listDiv);

  const renderList=()=>{
    listDiv.innerHTML="";
    depts.forEach((d,i)=>{
      const row=el("div");row.style.cssText="display:flex;gap:8px;align-items:center;margin-bottom:8px";
      const inp=el("input","input");inp.value=d;inp.style.cssText="flex:1;padding:9px 12px;font-size:13px";
      inp.oninput=()=>{depts[i]=inp.value;};
      const delBtn=el("button");delBtn.style.cssText="padding:8px 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--red);font-size:13px;flex-shrink:0";
      delBtn.textContent="✕";
      delBtn.onclick=()=>{
        if(depts.length<=1){alert("חייבת להיות לפחות מחלקה אחת");return;}
        depts.splice(i,1);renderList();
      };
      row.appendChild(inp);row.appendChild(delBtn);
      listDiv.appendChild(row);
    });
  };
  renderList();

  // כפתור הוסף מחלקה
  const addBtn=el("button");
  addBtn.style.cssText="width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--border);background:transparent;color:var(--accent);font-weight:600;font-size:13px;cursor:pointer;margin-top:4px";
  addBtn.textContent="+ הוסף מחלקה";
  addBtn.onclick=()=>{depts.push("מחלקה חדשה");renderList();};
  content.appendChild(addBtn);

  // שמור
  const saveBtn=el("button","btn");saveBtn.style.marginTop="12px";saveBtn.textContent="שמור מחלקות";
  saveBtn.onclick=async()=>{
    const cleaned=depts.map(d=>d.trim()).filter(Boolean);
    state.departments=cleaned;
    await fsSaveSettings({departments:cleaned});
    saveBtn.textContent="✓ נשמר!";setTimeout(()=>saveBtn.textContent="שמור מחלקות",2000);
  };
  content.appendChild(saveBtn);

  const warn=el("p");warn.style.cssText="font-size:11px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.6";
  warn.textContent="⚠️ שינוי שם מחלקה לא ישנה את המחלקה של משתמשים שכבר נרשמו – יש לעדכן אותם ידנית בלשונית משתמשים.";
  content.appendChild(warn);
}

function renderAdminScorers(content){
  const info=el("div","card");info.innerHTML=`<p style="font-weight:700;font-size:14px;color:var(--text);margin:0 0 4px">רשימת מועמדי מלך השערים</p><p style="font-size:12px;color:var(--muted);margin:0">שחקן אחד בכל שורה · עד 10 שחקנים</p>`;
  content.appendChild(info);
  const ta=el("textarea");ta.style.cssText="width:100%;padding:12px 14px;border-radius:10px;border:0.5px solid var(--border);background:var(--surface);font-size:14px;color:var(--text);box-sizing:border-box;direction:rtl;resize:vertical;outline:none;font-family:inherit;line-height:2;min-height:200px;margin-top:10px";
  ta.value=state.scorers.join("\n");content.appendChild(ta);

  // Top scorer result
  const tsInfo=el("div","card");tsInfo.style.marginTop="10px";
  tsInfo.innerHTML=`<p style="font-weight:700;font-size:13px;color:var(--text);margin:0 0 6px">מלך השערים בפועל (לאחר המונדיאל)</p>
  <input id="top-scorer-result" class="input" placeholder="שם השחקן שזכה" value="${state.prizes.topScorer||""}"/>`;
  content.appendChild(tsInfo);

  const saveBtn=el("button","btn");saveBtn.style.marginTop="10px";saveBtn.textContent="שמור";
  saveBtn.onclick=async()=>{
    const list=ta.value.split("\n").map(s=>s.trim()).filter(Boolean).slice(0,10);
    state.scorers=list;
    const ts=qs("#top-scorer-result").value.trim();
    await fsSaveSettings({scorers:list,topScorer:ts||null});
    saveBtn.textContent="✓ נשמר!";setTimeout(()=>saveBtn.textContent="שמור",2000);
  };
  content.appendChild(saveBtn);
}

function renderAdminPrizes(content){
  const info=el("div","card");info.innerHTML=`<p style="font-size:13px;color:var(--muted);margin:0">הגדר את הפרסים שיוצגו לכל העובדים (אופציונלי – יש פרסי ברירת מחדל)</p>`;
  content.appendChild(info);
  [["first","🥇 פרס מקום ראשון"],["second","🥈 פרס מקום שני"],["third","🥉 פרס מקום שלישי"],["winner","🏆 מנצח המונדיאל בפועל (לחישוב נקודות)"]].forEach(([k,label])=>{
    const wrap=el("div");wrap.style.marginTop="10px";
    wrap.innerHTML=`<label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px">${label}</label><input id="pr-${k}" class="input" value="${state.prizes[k]||""}" placeholder="תאר את הפרס..."/>`;
    content.appendChild(wrap);
  });

  // גודל מחלקות – משתמשים ב-index כ-id כדי להימנע מבעיות עם רווחים/תווים
  const sizeTitle=el("div","card");sizeTitle.style.marginTop="16px";
  sizeTitle.innerHTML=`<p style="font-weight:700;font-size:14px;color:var(--text);margin:0 0 4px">🏢 מספר עובדים לכל מחלקה</p><p style="font-size:12px;color:var(--muted);margin:0">לשימוש עתידי – הזן את מספר העובדים הכולל בכל מחלקה</p>`;
  content.appendChild(sizeTitle);

  const currentDepts=getDepts();
  const sizes=state.prizes.deptSizes||{};
  currentDepts.forEach((d,i)=>{
    const wrap=el("div");wrap.style.marginTop="8px";
    wrap.innerHTML=`<label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px">${d}</label>
      <input id="sz-dept-${i}" class="input" type="number" min="1" value="${sizes[d]||""}" placeholder="מס׳ עובדים..." style="padding:9px 14px;font-size:13px"/>`;
    content.appendChild(wrap);
  });

  const saveBtn=el("button","btn");saveBtn.style.marginTop="14px";saveBtn.textContent="שמור הכל";
  saveBtn.onclick=async()=>{
    const pr={
      first:qs("#pr-first").value,
      second:qs("#pr-second").value,
      third:qs("#pr-third").value,
      winner:qs("#pr-winner").value,
    };
    const deptSizes={};
    currentDepts.forEach((d,i)=>{
      const v=qs(`#sz-dept-${i}`);
      if(v&&v.value)deptSizes[d]=parseInt(v.value)||0;
    });
    pr.deptSizes=deptSizes;
    state.prizes={...state.prizes,...pr};
    await fsSaveSettings({prizes:state.prizes});
    saveBtn.textContent="✓ נשמר!";setTimeout(()=>saveBtn.textContent="שמור הכל",2000);
  };
  content.appendChild(saveBtn);
}

// ── Admin Security Tab ────────────────────────────────────────────────────────
async function renderAdminSecurity(content){
  const info=el("div","card");
  info.innerHTML=`<p style="font-weight:700;font-size:14px;color:var(--text);margin:0 0 4px">🔐 סיסמת מנהל</p><p style="font-size:12px;color:var(--muted);margin:0">הסיסמה שמורה ב-Firebase בלבד ואינה גלויה בקוד</p>`;
  content.appendChild(info);

  // Show current (masked)
  const d=await getDoc(doc(db,"settings","admin"));
  const hasPwd=d.exists()&&d.data().password;

  const form=el("div","card");form.style.marginTop="10px";
  form.innerHTML=`
    <p style="font-size:13px;color:var(--muted);margin:0 0 10px">
      ${hasPwd?"סיסמה קיימת: ••••••••":"⚠️ לא הוגדרה סיסמה עדיין – הגדר עכשיו!"}
    </p>
    <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px">סיסמה חדשה</label>
    <input id="new-admin-pwd" class="input" type="password" placeholder="הזן סיסמה חדשה" style="text-align:center;letter-spacing:2px;margin-bottom:8px"/>
    <label style="display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px">אימות סיסמה</label>
    <input id="new-admin-pwd2" class="input" type="password" placeholder="הזן שוב" style="text-align:center;letter-spacing:2px;margin-bottom:10px"/>
    <div id="sec-err" class="error" style="display:none;margin-bottom:8px"></div>
    <button id="save-admin-pwd" class="btn" style="margin-top:0">שמור סיסמה ב-Firebase</button>`;
  content.appendChild(form);

  qs("#save-admin-pwd").onclick=async()=>{
    const p1=qs("#new-admin-pwd").value;
    const p2=qs("#new-admin-pwd2").value;
    qs("#sec-err").style.display="none";
    if(p1.length<4){qs("#sec-err").textContent="סיסמה חייבת להכיל לפחות 4 תווים";qs("#sec-err").style.display="block";return;}
    if(p1!==p2){qs("#sec-err").textContent="הסיסמאות אינן תואמות";qs("#sec-err").style.display="block";return;}
    qs("#save-admin-pwd").textContent="...";qs("#save-admin-pwd").disabled=true;
    await setDoc(doc(db,"settings","admin"),{password:p1});
    qs("#save-admin-pwd").textContent="✓ נשמר ב-Firebase!";
    setTimeout(()=>renderAdminSecurity(content),1500);
  };
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  // Load settings from Firestore
  const settings=await fsGetSettings();
  if(settings.scorers)state.scorers=settings.scorers;
  if(settings.prizes)state.prizes=settings.prizes;
  if(settings.departments)state.departments=settings.departments;
  if(settings.matches){
    settings.matches.forEach(sm=>{
      const m=state.matches.find(x=>x.id===sm.id);
      if(m){m.result=sm.result||null;m.locked=!!sm.locked;}
    });
  }

  // Live listeners
  fsListenUsers(users=>{
    state.liveUsers=users;
    if(state.user){
      const me=users.find(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
      if(me)state.user={...state.user,...me};
    }
    if(state.screen==="leaderboard"||state.screen==="profile"){render();}
  });
  fsListenSettings(settings=>{
    if(settings.scorers)state.scorers=settings.scorers;
    if(settings.prizes)state.prizes=settings.prizes;
    if(settings.departments)state.departments=settings.departments;
    if(settings.matches){
      settings.matches.forEach(sm=>{
        const m=state.matches.find(x=>x.id===sm.id);
        if(m){m.result=sm.result||null;m.locked=!!sm.locked;}
      });
    }
    if(state.screen==="matches"||state.screen==="prizes")render();
  });

  // Auto-login
  const savedName=sessionStorage.getItem("mundial_user");
  if(savedName){
    const u=await fsGetUser(savedName);
    if(u){state.user=u;}
  }

  render();
}

init();

// רענון אוטומטי כל 60 שניות – כדי שנעילת משחקים תיכנס לתוקף בזמן אמת
setInterval(()=>{
  if(state.user&&state.screen==="matches"){
    const area=qs(".scroll-area");
    if(area)renderMatches(area);
  }
},60000);
</script>
