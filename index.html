*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}
:root{--bg:#f0f7f0;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#0d2b0d;--muted:#4a7a4a;--accent:#006633;--chip:#e0f0e0;--green:#006633;--red:#e53935;--gold:#F0B429;--silver:#B0BEC5;--bronze:#CD7F32}

button{cursor:pointer;font-family:inherit;direction:rtl}
input{font-family:inherit;direction:rtl}
.screen{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.topbar{display:flex;align-items:center;padding:10px 16px 8px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10;gap:8px}
.topbar-title{flex:1;font-weight:700;font-size:15px;color:var(--text);text-align:center}
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px 20px}
.top-nav{display:flex;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:49px;z-index:9;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.top-nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;padding:8px 14px 6px;background:none;border:none;border-bottom:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10px;font-weight:400;white-space:nowrap;cursor:pointer;transition:all .15s}
.nav-btn.active{color:var(--accent);font-weight:700;border-bottom:3px solid var(--accent)}
.nav-btn:hover{color:var(--text)}
.nav-emoji{font-size:16px}
.card{background:var(--surface);border-radius:14px;border:0.5px solid var(--border);padding:13px 15px;margin-bottom:10px}
.chip{background:var(--chip);border:0.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);font-weight:600;cursor:pointer}
.chip.active{background:var(--accent);color:#fff;border-color:transparent}
.btn{padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;width:100%;margin-top:6px}
.btn:disabled{opacity:0.45}
.input{width:100%;padding:11px 14px;border-radius:10px;border:0.5px solid var(--border);background:var(--bg);font-size:15px;color:var(--text);outline:none;text-align:right}
.error{color:var(--red);font-size:13px;text-align:center;margin-top:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;color:#fff}
.badge-green{background:var(--green)}
.badge-red{background:var(--red)}
.hidden{display:none!important}
.loader{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:28px;background:var(--bg)}
.tab-bar{display:flex;background:var(--chip);border-radius:10px;padding:3px;margin:10px 16px 4px}
.tab-btn{flex:1;padding:8px 0;border-radius:8px;border:none;background:transparent;color:var(--muted);font-weight:400;font-size:13px;transition:all .15s}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:700}
.match-teams{display:flex;align-items:center;gap:8px;margin:8px 0}
.team-circle{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.bet-chips{display:flex;gap:6px}
.bet-chip{flex:1;padding:6px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--chip);color:var(--muted);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .13s}
.bet-chip.sel{background:var(--accent);color:#fff;border:none}
.bet-chip.disabled{opacity:.32}
.bet-chip span:first-child{font-size:14px}
</style>
</head>

function hashPwd(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}
function teamColor(name){const p=["#1a6fa8","#b83232","#2e8b57","#8b5e2e","#6a4fa8","#b87a1a","#2e7a8b","#a83268","#3a7a3a","#8b3a3a"];const i=(name.charCodeAt(0)+(name.charCodeAt(1)||0))%p.length;return p[i];}

// נעילה אוטומטית לפי שעת קיקאוף (שעון ישראל)
function isMatchLocked(m){
  // שחרור זמני למשתמש ספציפי ע"י מנהל
  if(state.user&&state.user.tempUnlock&&!m.result) return false;
  // נעול ידנית ע"י מנהל
  if(m.locked||m.result) return true;
  // תאריך/שעה לא ידועים
  if(!m.date||!m.time||m.date==="טרם נקבע"||m.time==="—") return false;
  try{
    // מיפוי חודשים עבריים לאנגלית
    const months={"ינואר":1,"פברואר":2,"מרץ":3,"אפריל":4,"מאי":5,"יוני":6,"יולי":7,"אוגוסט":8,"ספטמבר":9,"אוקטובר":10,"נובמבר":11,"דצמבר":12};
    const parts=m.date.split(" ");
    const day=parseInt(parts[0]);
    const month=months[parts[1]];
    const year=2026;
    const [hh,mm]=m.time.split(":").map(Number);
    // בונים תאריך ב-UTC: שעון ישראל הוא UTC+3 בקיץ
    // נשתמש ב-Date ישירות עם שעון ישראל
    const kickoffStr=`${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}T${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:00+03:00`;
    const kickoff=new Date(kickoffStr);
    return Date.now()>=kickoff.getTime();
  }catch(e){return false;}
}
function qs(sel){return document.querySelector(sel);}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}
function shortName(n){return n.length>6?n.slice(0,6)+"…":n;}

// ── State ─────────────────────────────────────────────────────────────────────
let state={user:null,screen:"matches",dark:false,matchTab:"knockout",activeGroup:"א",matches:[...SCHEDULE],scorers:[...DEFAULT_SCORERS],departments:[...DEFAULT_DEPARTMENTS],prizes:{first:"",second:"",third:"",dept:""},adminTab:"results",adminGroup:"א",userFilter:"all",leaderTab:"personal",allUsers:[],liveUsers:[]};

// ── Firestore ─────────────────────────────────────────────────────────────────
async function fsGetUser(name){
  const d=await getDoc(doc(db,"users",name.toLowerCase()));
  return d.exists()?d.data():null;
}
async function fsSaveUser(data){
  await setDoc(doc(db,"users",data.name.toLowerCase()),data,{merge:true});
}
async function fsGetSettings(){
  const d=await getDoc(doc(db,"settings","main"));
  return d.exists()?d.data():{};
}
async function fsSaveSettings(data){
  await setDoc(doc(db,"settings","main"),data,{merge:true});
}
async function fsGetAllUsers(){
  const snap=await getDocs(collection(db,"users"));
  return snap.docs.map(d=>d.data());
}
async function fsDeleteUser(name){
  await deleteDoc(doc(db,"users",name.toLowerCase()));
}
function fsListenUsers(cb){
  return onSnapshot(collection(db,"users"),snap=>{
    cb(snap.docs.map(d=>d.data()));
  });
}
function fsListenSettings(cb){
  return onSnapshot(doc(db,"settings","main"),snap=>{
    if(snap.exists())cb(snap.data());
  });
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login(name,pwd,dept,pwd2,isNew){
  const existing=await fsGetUser(name);
  if(existing){
    if(existing.pwdHash!==hashPwd(pwd)){return"סיסמה שגויה";}
    state.user={...existing};
    return null;
  } else {
    if(!dept){return"יש לבחור מחלקה";}
    if(pwd.length<4){return"סיסמה חייבת להכיל לפחות 4 תווים";}
    if(pwd!==pwd2){return"הסיסמאות אינן תואמות";}
    const profile={name,dept,pwdHash:hashPwd(pwd),bets:{},scorerBet:null,winnerBet:null,points:0};
    await fsSaveUser(profile);
    state.user={...profile};
    return null;
  }
}
function logout(){
  state.user=null;
  sessionStorage.removeItem("mundial_user");
  render();
}

// ── Bet saving ────────────────────────────────────────────────────────────────
async function saveBet(matchId,val){
  if(!state.user)return;
  // חפש בבתים ובנוקאאוט
  const match=state.matches.find(m=>m.id===matchId)||KNOCKOUT_MATCHES.find(m=>m.id===matchId);
  if(!match){console.warn("משחק לא נמצא:",matchId);return;}
  // בדיקת נעילה
  if(match.locked||match.result){console.warn("משחק נעול:",matchId);return;}
  state.user.bets={...state.user.bets,[matchId]:val};
  const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
  state.user.points=pts;
  const idx=state.liveUsers.findIndex(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
  if(idx>=0) state.liveUsers[idx]={...state.liveUsers[idx],bets:state.user.bets,points:pts};
  else state.liveUsers.push({...state.user,points:pts});
  await fsSaveUser({...state.user,points:pts});
}

// ── Compute points ────────────────────────────────────────────────────────────
function calcPoints(user,matches,scorers,prizes,winnerResult){
  let pts=0;
  // נקודות על משחקי בתים
  matches.forEach(m=>{
    if(!user.bets||!user.bets[m.id]) return;
    pts+=1;
    if(m.result&&user.bets[m.id]===m.result) pts+=5;
  });
  // נקודות על משחקי נוקאאוט
  KNOCKOUT_MATCHES.forEach(m=>{
    if(!user.bets||!user.bets[m.id]) return;
    pts+=1;
    if(m.result&&user.bets[m.id]===m.result) pts+=5;
  });
  if(user.scorerBet&&scorers.topScorer&&user.scorerBet===scorers.topScorer) pts+=8;
  if(user.winnerBet&&winnerResult&&user.winnerBet===winnerResult) pts+=10;
  return pts;
}

// חישוב וחידוש נקודות לכל המשתמשים ב-Firebase
async function recalcAllPoints(){
  const allUsers=await fsGetAllUsers();
  const topScorer=state.prizes.topScorer||null;
  const winnerResult=state.prizes.winner||null;
  const updates=allUsers.map(async u=>{
    const pts=calcPoints(u,state.matches,{topScorer},state.prizes,winnerResult);
    if(u.points!==pts){
      await fsSaveUser({...u,points:pts});
    }
  });
  await Promise.all(updates);
  console.log("✅ נקודות עודכנו לכל המשתמשים");
}

function renderGroupStandings(group){
  const teams=GROUPS[group];
  if(!teams)return null;
  const groupMatches=state.matches.filter(m=>m.group===group&&m.result);
  if(!groupMatches.length)return null; // אין תוצאות עדיין

  // חשב סטטיסטיקות
  const stats={};
  teams.forEach(t=>{stats[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});

  // קבל שערים מה-API (אם קיים) – אחרת רק נ/ת/ה לפי תוצאה
  groupMatches.forEach(m=>{
    const hs=stats[m.home], as=stats[m.away];
    if(!hs||!as)return;
    hs.p++; as.p++;
    if(m.result==="2"){hs.w++;hs.pts+=3;as.l++;}
    else if(m.result==="1"){as.w++;as.pts+=3;hs.l++;}
    else{hs.d++;as.d++;hs.pts++;as.pts++;}
  });

  const sorted=teams.slice().sort((a,b)=>{
    const sa=stats[a],sb=stats[b];
    if(sb.pts!==sa.pts)return sb.pts-sa.pts;
    return (sb.gf-sb.ga)-(sa.gf-sa.ga);
  });

  const card=el("div","card");
  card.style.marginBottom="10px";
  let html=`<p style="font-weight:700;font-size:13px;color:var(--text);margin:0 0 8px">טבלת בית ${group}</p>
  <table style="width:100%;font-size:12px;border-collapse:collapse">
    <thead>
      <tr style="border-bottom:0.5px solid var(--border)">
        <th style="text-align:right;padding:3px 4px;color:var(--muted);font-weight:400">#</th>
        <th style="text-align:right;padding:3px 4px;color:var(--muted);font-weight:400">נבחרת</th>
        <th style="text-align:center;padding:3px 4px;color:var(--muted);font-weight:400">מ</th>
        <th style="text-align:center;padding:3px 4px;color:var(--muted);font-weight:400">נ</th>
        <th style="text-align:center;padding:3px 4px;color:var(--muted);font-weight:400">ת</th>
        <th style="text-align:center;padding:3px 4px;color:var(--muted);font-weight:400">ה</th>
        <th style="text-align:center;padding:3px 4px;color:var(--muted);font-weight:400">נק</th>
      </tr>
    </thead>
    <tbody>`;

  sorted.forEach((t,i)=>{
    const s=stats[t];
    html+=`<tr style="border-bottom:0.5px solid var(--border)">
      <td style="padding:6px 4px;text-align:center;color:var(--muted);font-size:11px">${i+1}</td>
      <td style="padding:6px 4px;color:var(--text)">${t}</td>
      <td style="text-align:center;padding:6px 4px;color:var(--muted)">${s.p}</td>
      <td style="text-align:center;padding:6px 4px;color:var(--green);font-weight:${s.w?600:400}">${s.w}</td>
      <td style="text-align:center;padding:6px 4px;color:var(--muted)">${s.d}</td>
      <td style="text-align:center;padding:6px 4px;color:${s.l?"var(--red)":"var(--muted)"};font-weight:${s.l?600:400}">${s.l}</td>
      <td style="text-align:center;padding:6px 4px;font-weight:700;color:var(--accent)">${s.pts}</td>
    </tr>`;
  });

  html+=`</tbody></table>
  <p style="font-size:10px;color:var(--muted);margin:6px 0 0;text-align:right">מ=משחקים · נ=נצחון · ת=תיקו · ה=הפסד · נק=נקודות</p>`;
  card.innerHTML=html;
  return card;
}

function matchCard(m){
  const locked=isMatchLocked(m);
  const autoLocked=locked&&!m.locked&&!m.result;
  const userBet=state.user.bets&&state.user.bets[m.id];
  const betResult=userBet&&m.result?(userBet===m.result?"win":"loss"):null;
  const card=el("div","card");
  let headerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:11px;color:var(--muted)">בית ${m.group} · ${m.date} · ${m.time}</span>`;
  if(betResult==="win")headerHTML+=`<span class="badge badge-green">+5 ✓</span>`;
  else if(betResult==="loss")headerHTML+=`<span class="badge badge-red">0</span>`;
  else if(autoLocked)headerHTML+=`<span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:2px 7px">⏰ מתחיל</span>`;
  else if(locked&&!m.result)headerHTML+=`<span style="font-size:11px;color:var(--muted)">🔒</span>`;
  headerHTML+="</div>";

  const homeColor=teamColor(m.home),awayColor=teamColor(m.away);
  headerHTML+=`<div class="match-teams">
    <div class="team-circle" style="background:${homeColor}">${m.home.slice(0,2)}</div>
    <span style="font-weight:600;font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.home}</span>
    <span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:2px 6px;flex-shrink:0">נ׳</span>
    <span style="font-weight:600;font-size:13px;color:var(--text);flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.away}</span>
    <div class="team-circle" style="background:${awayColor}">${m.away.slice(0,2)}</div>
  </div>`;
  card.innerHTML=headerHTML;

  // Bet chips – לחיצה חוזרת מבטלת
  const chipsDiv=el("div","bet-chips");
  [[2,m.home],[`X`,"תיקו"],[1,m.away]].forEach(([v,label])=>{
    const isSelected=userBet===String(v);

async function fetchKnockoutMatches(){
  const hasNulls=KNOCKOUT_MATCHES.some(m=>!m.home||!m.away);
  if(hasNulls){
    try{
      const res=await fetch("https://mondialproxy.wteashivuk.workers.dev/?type=knockout");
      if(res.ok){
        const data=await res.json();
        if(data.matches){
          data.matches.forEach(apiMatch=>{
            const h=apiMatch.homeTeam?.name?hebrewTeam(apiMatch.homeTeam.name):null;
            const a=apiMatch.awayTeam?.name?hebrewTeam(apiMatch.awayTeam.name):null;
            if(!h&&!a)return;
            const koId="ko"+apiMatch.id;
            const local=KNOCKOUT_MATCHES.find(m=>m.id===koId);
            if(local){
              if(h&&!local.home)local.home=h;
              if(a&&!local.away)local.away=a;
            }
          });
        }
      }
    }catch(e){}
  }
  return KNOCKOUT_MATCHES;
}

  if(!dept)return null;
  // בדיקה מדויקת
  for(const [g,depts] of Object.entries(DEPT_GROUPS)){
    if(depts.includes(dept))return g;
  }
  if(LEGACY_DEPT_MAP[dept])return LEGACY_DEPT_MAP[dept];
  // בדיקה גמישה – מתעלם מרווחים לפני/אחרי מקף
  const normalized=dept.replace(/\s*-\s*/g,"-");
  if(LEGACY_DEPT_MAP[normalized])return LEGACY_DEPT_MAP[normalized];
  // בדיקה לפי prefix
  if(dept.startsWith("מטה"))return "מטה";
  if(dept.startsWith("מפעל"))return "מפעל";
  if(dept.includes("לוגיסטיקה")||dept.includes("מרלו"))return "לוגיסטיקה";
  if(dept.includes("מכירות"))return "מכירות";
  return null;
}

function shortDeptName(name){
  return name.replace(/^מטה- /,"").replace(/^מפעל- /,"").replace(/^מרלו"ג- /,"");
}

        <input class="ko-home" data-id="${m.id}" value="${m.home||""}" placeholder="נבחרת בית" style="flex:1;padding:6px 10px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);font-size:12px;color:var(--text);direction:rtl"/>
        <span style="align-self:center;color:var(--muted);font-size:11px;flex-shrink:0">נ׳</span>
        <input class="ko-away" data-id="${m.id}" value="${m.away||""}" placeholder="נבחרת אורח" style="flex:1;padding:6px 10px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);font-size:12px;color:var(--text);direction:rtl"/>
      </div>
      <div style="display:flex;gap:6px">
        ${[["2",m.home||"בית"],["X","תיקו"],["1",m.away||"אורח"]].map(([v,label])=>`
          <button class="ko-result-btn" data-id="${m.id}" data-val="${v}"
            style="flex:1;padding:6px 4px;border-radius:8px;cursor:pointer;border:${m.result===v?"none":"0.5px solid var(--border)"};

            ${v} – ${String(label).length>6?String(label).slice(0,6)+"…":String(label)}
          </button>`).join("")}
      </div>`;
      card.innerHTML=h;
      content.appendChild(card);
    });
  });

  // Wire buttons
  content.querySelectorAll(".ko-home,.ko-away").forEach(inp=>{
    inp.onblur=async()=>{
      const id=inp.dataset.id;
      const m=KNOCKOUT_MATCHES.find(x=>x.id===id);
      if(!m)return;
      const homeInp=content.querySelector(`.ko-home[data-id="${id}"]`);
      const awayInp=content.querySelector(`.ko-away[data-id="${id}"]`);
      m.home=homeInp.value.trim()||null;
      m.away=awayInp.value.trim()||null;
      await saveKnockoutToFirebase();
    };
  });

  content.querySelectorAll(".ko-result-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.dataset.id, val=btn.dataset.val;
      const m=KNOCKOUT_MATCHES.find(x=>x.id===id);
      if(!m)return;
      // וודא שיש נבחרות לפני סימון תוצאה
      const homeInp=content.querySelector(`.ko-home[data-id="${id}"]`);
      const awayInp=content.querySelector(`.ko-away[data-id="${id}"]`);
      if(homeInp)m.home=homeInp.value.trim()||m.home;
      if(awayInp)m.away=awayInp.value.trim()||m.away;
      m.result=m.result===val?null:val;
      m.locked=!!m.result;
      await saveKnockoutToFirebase();
      await recalcAllPoints();
      renderAdminContent(content);
    };
  });

  content.querySelectorAll(".ko-clear-btn").forEach(btn=>{
    btn.onclick=async()=>{
      const m=KNOCKOUT_MATCHES.find(x=>x.id===btn.dataset.id);
      if(!m)return;
      m.result=null;m.locked=false;
      await saveKnockoutToFirebase();
      await recalcAllPoints();
      renderAdminContent(content);
    };
  });
}

function renderAdminResults(content){

  // כפתור סנכרון מ-API
  const syncBtn=el("button","btn");
  syncBtn.style.cssText="margin-bottom:6px;background:#1a5e2a;font-size:13px;padding:10px;width:100%";
  syncBtn.textContent="🌐 סנכרן תוצאות מ-API";
  syncBtn.onclick=async()=>{
    syncBtn.textContent="...מסנכרן";syncBtn.disabled=true;
    const logDiv=qs("#sync-log");
    try{
      const r=await fetchResultsFromAPI();
      if(logDiv){
        logDiv.style.display="block";
        logDiv.innerHTML=`<strong>עודכנו: ${r.updated} | לא מזוהה: ${r.skipped}</strong><br>`+r.log.join("<br>");
      }

      setTimeout(()=>{syncBtn.textContent="🌐 סנכרן תוצאות מ-API";syncBtn.disabled=false;},3000);

    }catch(e){
      if(logDiv){logDiv.style.display="block";logDiv.textContent="❌ שגיאה: "+e.message;}
      syncBtn.textContent="🌐 סנכרן תוצאות מ-API";syncBtn.disabled=false;

  // לוג סנכרון
  const logDiv=el("div");logDiv.id="sync-log";

    setTimeout(()=>{recalcBtn.textContent="🔄 חשב נקודות מחדש לכל המשתמשים";recalcBtn.disabled=false;},2500);
  };
  content.appendChild(recalcBtn);

  const tabs=el("div");tabs.style.cssText="display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px";
  Object.keys(GROUPS).forEach(g=>{
    const done=state.matches.filter(m=>m.group===g&&m.result).length;

    const b=el("button","chip"+(g===state.adminGroup?" active":""));
    b.style.flexShrink="0";b.textContent=`בית ${g}${done>0?` (${done}/${total})`:""}`;
    b.onclick=()=>{state.adminGroup=g;renderAdminResults(content);};tabs.appendChild(b);
  });
  content.appendChild(tabs);
  state.matches.filter(m=>m.group===state.adminGroup).forEach(m=>{
    const card=el("div","card");card.style.border=m.result?"1.5px solid var(--green)":"0.5px solid var(--border)";

      <span style="font-size:11px;color:var(--muted)">${m.date} · ${m.time}</span>
      ${m.result?`<button onclick="clearResult('${m.id}')" style="font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer">✕ נקה</button>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="flex:1;font-weight:600;font-size:13px;color:var(--text)">${m.home}</span>
      <span style="font-size:11px;color:var(--muted);background:var(--chip);border-radius:6px;padding:1px 6px">נ׳</span>
      <span style="flex:1;font-weight:600;font-size:13px;color:var(--text);text-align:left">${m.away}</span>
    </div>
    <div style="display:flex;gap:6px">`;
    [[2,m.home],[`X`,"תיקו"],[1,m.away]].forEach(([v,label])=>{
      h+=`<button onclick="setResult('${m.id}','${v}')" style="flex:1;padding:7px 4px;border-radius:8px;cursor:pointer;border:${m.result===String(v)?"none":"0.5px solid var(--border)"};background:${m.result===String(v)?"var(--green)":"var(--chip)"};color:${m.result===String(v)?"#fff":"var(--muted)"};font-size:10px;font-weight:600">${v} – ${shortName(String(label))}</button>`;

window.setResult=async(id,val)=>{
  const m=state.matches.find(m=>m.id===id);if(!m)return;
  m.result=val;m.locked=true;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});
  // חישוב נקודות אוטומטי לכל המשתמשים
  await recalcAllPoints();
  renderAdminResultsRefresh();
};
window.clearResult=async(id)=>{
  const m=state.matches.find(m=>m.id===id);if(!m)return;
  m.result=null;m.locked=false;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});

  renderAdminResultsRefresh();
};

function renderAdminDepts(content){

// ── Admin Backup Tab ──────────────────────────────────────────────────────────
async function renderAdminBackup(content){
  const info=el("div","card");
  info.innerHTML=`<p style="font-weight:700;font-size:14px;color:var(--text);margin:0 0 4px">💾 גיבוי ושחזור</p>
    <p style="font-size:12px;color:var(--muted);margin:0">הורד גיבוי מלא של כל המשתמשים וניחושיהם. שמור את הקובץ במחשב. לשחזור – העלה קובץ גיבוי.</p>`;
  content.appendChild(info);

  // כפתור ייצוא
  const exportBtn=el("button","btn");exportBtn.style.marginTop="10px";exportBtn.textContent="⬇️ הורד גיבוי עכשיו";
  exportBtn.onclick=async()=>{
    exportBtn.textContent="...טוען";exportBtn.disabled=true;
    const allUsers=await fsGetAllUsers();
    const settings=await fsGetSettings();
    const backup={timestamp:new Date().toISOString(),users:allUsers,settings};
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`mundial2026-backup-${new Date().toLocaleDateString("he-IL").replace(/\//g,"-")}.json`;
    a.click();URL.revokeObjectURL(url);
    exportBtn.textContent="✓ גיבוי הורד!";exportBtn.disabled=false;
    setTimeout(()=>exportBtn.textContent="⬇️ הורד גיבוי עכשיו",3000);
  };
  content.appendChild(exportBtn);

  // כפתור ייבוא
  const importCard=el("div","card");importCard.style.marginTop="10px";
  importCard.innerHTML=`<p style="font-weight:700;font-size:13px;color:var(--text);margin:0 0 8px">⬆️ שחזור מגיבוי</p>
    <p style="font-size:12px;color:var(--red);margin:0 0 10px">⚠️ שחזור ידרוס נתונים קיימים. בצע גיבוי לפני כן!</p>
    <input id="backup-file" type="file" accept=".json" style="width:100%;margin-bottom:10px"/>
    <button id="import-btn" class="btn" style="margin-top:0;background:var(--red)">שחזר מגיבוי</button>
    <div id="import-status" style="margin-top:8px;font-size:12px;color:var(--muted)"></div>`;
  content.appendChild(importCard);

  qs("#import-btn").onclick=async()=>{
    const file=qs("#backup-file").files[0];
    if(!file){qs("#import-status").textContent="יש לבחור קובץ";return;}
    if(!confirm("האם אתה בטוח? פעולה זו תדרוס נתונים קיימים!"))return;
    qs("#import-btn").textContent="...משחזר";qs("#import-btn").disabled=true;
    const text=await file.text();
    const backup=JSON.parse(text);
    // שחזר משתמשים
    for(const u of backup.users){
      await fsSaveUser(u);
    }
    // שחזר הגדרות
    if(backup.settings){await fsSaveSettings(backup.settings);}
    qs("#import-status").textContent=`✓ שוחזרו ${backup.users.length} משתמשים בהצלחה!`;
    qs("#import-btn").textContent="שחזר מגיבוי";qs("#import-btn").disabled=false;
  };
}

    const newScorer=qs("#scorer-select")?qs("#scorer-select").value||null:freshUser.scorerBet;
    const newWinner=qs("#winner-select")?qs("#winner-select").value||null:freshUser.winnerBet;
    const updated={...freshUser,bets:currentBets,scorerBet:newScorer,winnerBet:newWinner};
    const pts=calcPoints(updated,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
    updated.points=pts;
    await setDoc(doc(db,"users",updated.name.toLowerCase()),updated);
    qs("#save-bets-btn").textContent="✓ נשמר! " + pts + " נקודות";
    setTimeout(()=>form.remove(),2000);
  };
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  // Load settings from Firestore
  const settings=await fsGetSettings();
  if(settings.scorers){
    const sc=settings.scorers;
    if(!sc.some(s=>s.includes("רונאלדו"))){
      sc.push("כריסטיאנו רונאלדו (פורטוגל)");
      await fsSaveSettings({scorers:sc});
    }
    state.scorers=sc;
  }
  if(settings.prizes)state.prizes=settings.prizes;
  // בדיקה – אם Firebase מחזיר רשימה ישנה נאפס לברירת מחדל החדשה
  const isOldDepts=(d)=>d&&d.some(x=>x==="מנהלה"||x==="שיווק"||x==="מפעל"||x==="שרשרת אספקה");
  if(settings.departments&&!isOldDepts(settings.departments)) state.departments=settings.departments;
  else { state.departments=[...DEFAULT_DEPARTMENTS]; await fsSaveSettings({departments:[...DEFAULT_DEPARTMENTS]}); }
  if(settings.knockoutMatches&&settings.knockoutMatches.length){
    settings.knockoutMatches.forEach(sm=>{
      const m=KNOCKOUT_MATCHES.find(x=>x.id===sm.id);
      if(m){Object.assign(m,sm);}
      else{KNOCKOUT_MATCHES.push(sm);}
    });
  }
  if(settings.matches){
    settings.matches.forEach(sm=>{
      const m=state.matches.find(x=>x.id===sm.id);
      if(m){m.result=sm.result||null;m.locked=!!sm.locked;}
    });
  }

  // Live listeners
  fsListenUsers(async users=>{
    state.liveUsers=users;
    if(state.user){
      const me=users.find(u=>u.name.toLowerCase()===state.user.name.toLowerCase());
      if(me){
        state.user={...state.user,...me};
        const pts=calcPoints(state.user,state.matches,{topScorer:state.prizes.topScorer||null},state.prizes,state.prizes.winner||null);
        if(state.user.points!==pts){
          state.user.points=pts;
          await fsSaveUser({...state.user,points:pts});
        }
      }
      // רנדר מחדש רק אם המשתמש מחובר
      if(["leaderboard","profile","matches"].includes(state.screen)){render();}
    }
  });
  fsListenSettings(settings=>{
    if(settings.scorers)state.scorers=settings.scorers;
    if(settings.prizes)state.prizes=settings.prizes;
    if(settings.departments&&!isOldDepts(settings.departments))state.departments=settings.departments;
    if(settings.knockoutMatches&&settings.knockoutMatches.length){
      settings.knockoutMatches.forEach(sm=>{
        const m=KNOCKOUT_MATCHES.find(x=>x.id===sm.id);
        if(m){Object.assign(m,sm);}
        else{KNOCKOUT_MATCHES.push(sm);}
      });
    }
    if(settings.matches){
      settings.matches.forEach(sm=>{
        const m=state.matches.find(x=>x.id===sm.id);
        if(m){m.result=sm.result||null;m.locked=!!sm.locked;}
      });
    }
    if(state.user&&["matches","prizes","scorer","winner"].includes(state.screen))render();
  });

  // Auto-login
  const savedName=sessionStorage.getItem("mundial_user");
  if(savedName){
    const u=await fsGetUser(savedName);
    if(u){state.user=u;}
  }

  render();

  // חישוב נקודות מחדש בטעינה – מבטיח עדכניות
  setTimeout(async()=>{
    await recalcAllPoints();
    // רענן דירוג אם פתוח
    if(state.user&&state.screen==="leaderboard"){
      const area=qs(".scroll-area");
      if(area)renderLeaderboard(area);
    }
  }, 2000);
}

init();

// ── עדכון תוצאות אוטומטי מ-football-data.org ────────────────────────────────
const FD_API_KEY = "beaae390489f4b09ba8bef56b3c579a8";
const MATCH_DURATION_MS = 110 * 60 * 1000; // 110 דקות
const RETRY_DELAY_MS = 60 * 60 * 1000; // שעה אם לא הסתיים

// מיפוי שמות קבוצות API → עברית (כולל ווריאציות)
const TEAM_NAME_MAP = {
  "Mexico":"מקסיקו","South Africa":"דרום אפריקה","Korea Republic":"דרום קוריאה",
  "South Korea":"דרום קוריאה","Czech Republic":"צ'כיה","Czechia":"צ'כיה",
  "Canada":"קנדה","Bosnia and Herzegovina":"בוסניה","Bosnia-Herzegovina":"בוסניה","Bosnia":"בוסניה",
  "United States":"ארצות הברית","USA":"ארצות הברית","Paraguay":"פרגוואי",
  "Australia":"אוסטרליה","Turkey":"טורקיה","Türkiye":"טורקיה",
  "Qatar":"קטאר","Switzerland":"שוויץ","Brazil":"ברזיל","Morocco":"מרוקו",
  "Haiti":"האיטי","Scotland":"סקוטלנד","Germany":"גרמניה","Curaçao":"קורסאו",
  "Netherlands":"הולנד","Japan":"יפן","Ivory Coast":"חוף השנהב",
  "Côte d'Ivoire":"חוף השנהב","Ecuador":"אקוודור","Sweden":"שבדיה",
  "Tunisia":"תוניסיה","Spain":"ספרד","Cape Verde":"כף ורדה","Cape Verde Islands":"כף ורדה","Belgium":"בלגיה",
  "Egypt":"מצרים","Saudi Arabia":"ערב הסעודית","Uruguay":"אורוגוואי",
  "Iran":"איראן","New Zealand":"ניו זילנד","France":"צרפת","Senegal":"סנגל",
  "Iraq":"עיראק","Norway":"נורווגיה","Argentina":"ארגנטינה","Algeria":"אלג'יריה",
  "Austria":"אוסטריה","Jordan":"ירדן","Portugal":"פורטוגל",
  "Congo DR":"קונגו","DR Congo":"קונגו","Democratic Republic of Congo":"קונגו",
  "England":"אנגליה","Croatia":"קרואטיה","Ghana":"גאנה","Panama":"פנמה",
  "Colombia":"קולומביה","Uzbekistan":"אוזבקיסטן",
};

function hebrewTeam(name){ return TEAM_NAME_MAP[name]||null; }

// מצא משחק בלוח – רק אם שני השמות מזוהים בוודאות
function findMatchByTeams(apiHome, apiAway){
  const h=hebrewTeam(apiHome), a=hebrewTeam(apiAway);
  if(!h||!a) return null; // לא מזוהה – לא מעדכנים
  return state.matches.find(m=>
    (m.home===h&&m.away===a)||(m.home===a&&m.away===h)
  )||null;
}

// שמור תוצאה ב-Firebase – רק מנצח (2/X/1)
async function saveResultFromAPI(match, homeScore, awayScore, homeHeb, awayHeb){
  if(match.result) return false;
  // וידוא שהקבוצות תואמות למשחק
  if(match.home!==homeHeb&&match.home!==awayHeb) return false;
  let result;
  if(homeScore>awayScore) result=match.home===homeHeb?"2":"1";
  else if(awayScore>homeScore) result=match.home===homeHeb?"1":"2";
  else result="X";
  match.result=result; match.locked=true;
  await fsSaveSettings({matches:state.matches.map(m=>({id:m.id,result:m.result||null,locked:!!m.locked}))});
  await recalcAllPoints();
  console.log(`✅ ${match.home} ${homeScore}-${awayScore} ${match.away} → ${result}`);
  if(state.user&&["matches","leaderboard"].includes(state.screen)) render();
  return true;
}

// שליפת תוצאות – מחזיר סיכום
async function fetchResultsFromAPI(){
  const WORKER_URL = "https://mondialproxy.wteashivuk.workers.dev/";
  let res, data;
  try{
    res=await fetch(WORKER_URL);
    if(!res.ok) throw new Error(`Worker ${res.status}`);
    data=await res.json();
  }catch(e){
    throw new Error(e.message);
  }
  if(!data?.matches) return {updated:0,skipped:0,log:["⚠️ אין נתונים מה-API"]};
  let updated=0, skipped=0;
  const log=[];
  for(const m of data.matches){
    const apiHome=m.homeTeam?.name, apiAway=m.awayTeam?.name;
    const h=hebrewTeam(apiHome), a=hebrewTeam(apiAway);
    if(!h||!a){
      skipped++;
      log.push(`⚠️ לא מזוהה: "${apiHome}" vs "${apiAway}"`);
      continue;
    }
    const localMatch=findMatchByTeams(m.homeTeam.name, m.awayTeam.name);
    if(!localMatch){skipped++;log.push(`⚠️ לא נמצא: ${h} vs ${a}`);continue;}
    if(localMatch.result){continue;} // כבר מעודכן
    const hs=m.score?.fullTime?.home, as=m.score?.fullTime?.away;
    if(hs===null||hs===undefined||as===null||as===undefined){continue;}
    const ok=await saveResultFromAPI(localMatch,hs,as,h,a);
    if(ok){updated++;log.push(`✅ ${h} ${hs}-${as} ${a}`);}
  }
  return{updated,skipped,log};
}

// תזמון אוטומטי – רק כשמישהו פתוח, 30 דקות אחרי כל משחק
function scheduleSmartChecks(){
  const now=Date.now();
  const months={"ינואר":1,"פברואר":2,"מרץ":3,"אפריל":4,"מאי":5,"יוני":6,"יולי":7,"אוגוסט":8,"ספטמבר":9,"אוקטובר":10,"נובמבר":11,"דצמבר":12};
  state.matches.forEach(m=>{
    if(m.result||!m.date||m.date==="טרם נקבע"||!m.time||m.time==="—") return;
    try{
      const parts=m.date.split(" ");
      const day=parseInt(parts[0]),month=months[parts[1]];
      const [hh,mm]=m.time.split(":").map(Number);
      const kickoff=new Date(`2026-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}T${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:00+03:00`);
      const firstCheck=kickoff.getTime()+MATCH_DURATION_MS+(30*60*1000);
      const delay=firstCheck-now;
      if(delay>0&&delay<48*60*60*1000){
        // הזמן עוד לא הגיע – תזמן
        setTimeout(async()=>{
          const localMatch=state.matches.find(x=>x.id===m.id);
          if(localMatch?.result) return;
          try{
            const r=await fetchResultsFromAPI();
            if(r.updated===0){
              const lm=state.matches.find(x=>x.id===m.id);
              if(!lm?.result){
                setTimeout(async()=>{
                  if(!state.matches.find(x=>x.id===m.id)?.result)
                    try{await fetchResultsFromAPI();}catch(e){}
                },RETRY_DELAY_MS);
              }
            }
          }catch(e){console.warn("שגיאה:",e);}
        },delay);
      } else if(delay<=0&&!m.result){
        // הזמן כבר עבר ועדיין אין תוצאה – בדוק עכשיו
        setTimeout(async()=>{
          if(!state.matches.find(x=>x.id===m.id)?.result){
            try{await fetchResultsFromAPI();}catch(e){}
          }
        },3000+Math.random()*10000); // עיכוב קצר אקראי כדי לא להציף
      }
    }catch(e){}
  });
}

scheduleSmartChecks();

  if(state.user&&state.screen==="matches"){
